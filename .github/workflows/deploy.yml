name: Deploy Pickem API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name pickem-create-user \
            --zip-file fileb://target/pickem-api-1.0-SNAPSHOT.jar

          aws lambda update-function-code \
            --function-name pickem-create-game \
            --zip-file fileb://target/pickem-api-1.0-SNAPSHOT.jar

          aws lambda update-function-code \
            --function-name pickem-submit-pick \
            --zip-file fileb://target/pickem-api-1.0-SNAPSHOT.jar

          aws lambda update-function-code \
            --function-name pickem-submit-score \
            --zip-file fileb://target/pickem-api-1.0-SNAPSHOT.jar

          aws lambda update-function-code \
            --function-name pickem-get-leaderboard \
            --zip-file fileb://target/pickem-api-1.0-SNAPSHOT.jar
